<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" width="800" height="400">
  <style>
    .window { fill: #1a1b27; rx: 10; }
    .titlebar { fill: #16213e; }
    .text { font-family: 'Courier New', monospace; font-size: 13px; fill: #a9b1d6; }
    .prompt { fill: #7aa2f7; }
    .output { fill: #9ece6a; }
    .highlight { fill: #e0af68; }
    .purple { fill: #bb9af7; }
    .cursor { fill: #c0caf5; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .line1 { animation: fadein 0.5s 0.5s both; }
    .line2 { animation: fadein 0.5s 1.5s both; }
    .line3 { animation: fadein 0.5s 2.5s both; }
    .line4 { animation: fadein 0.5s 3.5s both; }
    .line5 { animation: fadein 0.5s 4.5s both; }
    .line6 { animation: fadein 0.5s 5.5s both; }
    .line7 { animation: fadein 0.5s 6.5s both; }
    .line8 { animation: fadein 0.5s 7.5s both; }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  </style>

  <rect width="800" height="400" rx="12" class="window"/>
  <rect width="800" height="36" rx="12" class="titlebar"/>
  <rect width="800" height="24" y="12" class="titlebar"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="340" y="23" font-family="sans-serif" font-size="12" fill="#6272a4">tanay@ai-engineer ~ zsh</text>

  <text x="20" y="65" class="text line1">
    <tspan class="prompt">tanay@ai</tspan>
    <tspan fill="#6272a4">:</tspan>
    <tspan class="purple">~</tspan>
    <tspan fill="#6272a4"> $ </tspan>
    <tspan fill="#c0caf5">python tanay_tammineni.py</tspan>
  </text>

  <text x="20" y="90" class="text line2">
    <tspan class="output">✓ </tspan>
    <tspan fill="#c0caf5">Initializing </tspan>
    <tspan class="highlight">AIEngineer</tspan>
    <tspan fill="#c0caf5">...</tspan>
  </text>

  <text x="20" y="115" class="text line3">
    <tspan class="output">✓ </tspan>
    <tspan fill="#c0caf5">Loading expertise: </tspan>
    <tspan class="purple">LLM · RAG · Distributed Training · Data Science</tspan>
  </text>

  <text x="20" y="140" class="text line4">
    <tspan class="output">✓ </tspan>
    <tspan fill="#c0caf5">Publications found: </tspan>
    <tspan class="highlight">2</tspan>
    <tspan fill="#c0caf5"> (UniLLMOps · CVR Journal 2023)</tspan>
  </text>

  <text x="20" y="165" class="text line5">
    <tspan class="output">✓ </tspan>
    <tspan fill="#c0caf5">Metrics loaded: </tspan>
    <tspan class="highlight">41.2% GPU reduction · 3.8x throughput · +23.7% faithfulness</tspan>
  </text>

  <text x="20" y="190" class="text line6">
    <tspan class="output">✓ </tspan>
    <tspan fill="#c0caf5">Status: </tspan>
    <tspan fill="#9ece6a">🟢 Open to AI/ML · Data Science · GenAI roles</tspan>
  </text>

  <text x="20" y="225" class="text line7">
    <tspan class="prompt">tanay@ai</tspan>
    <tspan fill="#6272a4">:</tspan>
    <tspan class="purple">~</tspan>
    <tspan fill="#6272a4"> $ </tspan>
    <tspan fill="#c0caf5">cat message.txt</tspan>
  </text>

  <text x="20" y="255" class="text line8">
    <tspan fill="#6272a4">"</tspan>
    <tspan fill="#c0caf5">I don't just build AI. I ship it to production.</tspan>
    <tspan fill="#6272a4">"</tspan>
  </text>

  <text x="20" y="285" class="text line8">
    <tspan class="prompt">tanay@ai</tspan>
    <tspan fill="#6272a4">:</tspan>
    <tspan class="purple">~</tspan>
    <tspan fill="#6272a4"> $ </tspan>
    <rect x="295" y="272" width="9" height="16" class="cursor"/>
  </text>
</svg>
