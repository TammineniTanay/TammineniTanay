<svg viewBox="0 0 800 120" xmlns="http://www.w3.org/2000/svg" width="800">
  <style>
    .bg { fill: #1a1b27; }
    .label { font-family: sans-serif; font-size: 11px; fill: #6272a4; }
    .value { font-family: sans-serif; font-size: 22px; font-weight: bold; }
  </style>
  <rect width="800" height="120" rx="10" class="bg"/>
  <text x="100" y="38" text-anchor="middle" class="value" fill="#bb9af7">41.2%</text>
  <text x="100" y="58" text-anchor="middle" class="label">GPU Memory Reduction</text>
  <rect x="30" y="70" width="140" height="6" rx="3" fill="#2a2b3d"/>
  <rect x="30" y="70" width="98" height="6" rx="3" fill="#bb9af7"/>
  <text x="300" y="38" text-anchor="middle" class="value" fill="#7aa2f7">3.8x</text>
  <text x="300" y="58" text-anchor="middle" class="label">Inference Throughput</text>
  <rect x="220" y="70" width="160" height="6" rx="3" fill="#2a2b3d"/>
  <rect x="220" y="70" width="130" height="6" rx="3" fill="#7aa2f7"/>
  <text x="500" y="38" text-anchor="middle" class="value" fill="#9ece6a">+23.7%</text>
  <text x="500" y="58" text-anchor="middle" class="label">Retrieval Faithfulness</text>
  <rect x="420" y="70" width="160" height="6" rx="3" fill="#2a2b3d"/>
  <rect x="420" y="70" width="95" height="6" rx="3" fill="#9ece6a"/>
  <text x="700" y="38" text-anchor="middle" class="value" fill="#e0af68">2</text>
  <text x="700" y="58" text-anchor="middle" class="label">Publications</text>
  <rect x="630" y="70" width="140" height="6" rx="3" fill="#2a2b3d"/>
  <rect x="630" y="70" width="140" height="6" rx="3" fill="#e0af68"/>
</svg>
